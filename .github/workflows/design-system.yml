name: Design System Guardrails

# Blocks PRs that introduce design-system violations (hardcoded colors,
# font-family, non-Solar icons, raw HTML primitives) on the lines they
# change. Pre-existing debt is never evaluated — see scripts/ds-guardrails.mjs.

on:
  pull_request:
    branches: [main, preview]

jobs:
  guardrails:
    name: Design system (changed lines)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.23

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run guardrails against the PR diff
        run: |
          git fetch --no-tags origin "${{ github.base_ref }}"
          node scripts/ds-guardrails.mjs --base "origin/${{ github.base_ref }}"
